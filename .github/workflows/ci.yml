name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guards:
    # PII-leak prevention — non-bypassable enforcement (local hooks can be skipped with --no-verify).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: uv.lock public-index guard
        run: bash scripts/check-uv-lock-registry.sh

      - name: PII denylist scan
        # Patterns injected from a secret — never stored in this public repo.
        # Skips (green) until PII_DENYLIST is configured in repo/org secrets.
        env:
          PII_DENYLIST: ${{ secrets.PII_DENYLIST }}
        run: python3 scripts/pii-scan.py

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r src/

      - name: Test
        run: uv run pytest -x -q --cov --cov-fail-under=90
