name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guards:
    # uv.lock public-index guard — non-bypassable (local hooks can be skipped with --no-verify).
    # PII-marker scanning is added separately via the shared cross-repo pii-scan mechanism.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: uv.lock public-index guard
        run: bash scripts/check-uv-lock-registry.sh

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r src/

      - name: Test
        run: uv run pytest -x -q --cov --cov-fail-under=90
