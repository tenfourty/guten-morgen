repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.46.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r src/
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q --cov --cov-fail-under=90
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-check-pre-push
        name: ruff check (pre-push)
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format-pre-push
        name: ruff format check (pre-push)
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
